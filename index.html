document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'boot', err:'', toast:'',\n      tab:'overview', shiftFilter:'month', calMode:'month', calCursor:null, selectedDay:null, ovMonth:null,\n      shiftSearch:'', outletSel:[], shiftMonth:null,\n      costRange:'month', editingClient:null, reveal:{}, ownerSel:null,\n    };\n    this.sb=null; this.accounts={owner:{},clients:[]}; this.outlets=[]; this.bannedByKey={};\n    this.session=null; this.client=null; this.shifts=[]; this.f={};\n    const d=new Date(); d.setDate(d.getDate()-1); this.OT_FROM=this.fmtYmd(d);\n  }\n  async componentDidMount(){\n    await this.waitFor(()=>window.supabase && window.supabase.createClient, 8000);\n    try { this.sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e){}\n    await this.loadCore();\n    this.restoreSession();\n  }\n  waitFor(fn,ms){ return new Promise(res=>{ const t0=Date.now(); const iv=setInterval(()=>{ if(fn()||Date.now()-t0>ms){clearInterval(iv);res();} },70); }); }\n\n  /* ---------- data ---------- */\n  async loadCore(){\n    if(!this.sb) return;\n    try { const {data}=await this.sb.from('app_settings').select('value').eq('key','client_accounts').maybeSingle(); if(data&&data.value) this.accounts=this.normAcc(data.value); } catch(e){}\n    try { const {data}=await this.sb.from('outlets').select('name,country,location').order('name'); this.outlets=data||[]; } catch(e){}\n    try { const {data}=await this.sb.from('app_settings').select('value').eq('key','profile_meta').maybeSingle(); const pm=(data&&data.value)||{}; const m={}; Object.entries(pm.outlets||{}).forEach(([k,v])=>{ if(v&&(v.banned_workers||[]).length) m[k]=v.banned_workers; }); this.bannedByKey=m; } catch(e){}\n  }\n  normAcc(v){ return { owner:(v&&v.owner)||{}, clients:Array.isArray(v&&v.clients)?v.clients:[] }; }\n  async saveAccounts(){ try { await this.sb.from('app_settings').upsert({key:'client_accounts',value:this.accounts,updated_at:new Date().toISOString()},{onConflict:'key'}); return true; } catch(e){ this.flash('Save failed: '+(e.message||e)); return false; } }\n  async loadClientShifts(){\n    const outs=(this.client&&this.client.outlets)||[];\n    if(!outs.length){ this.shifts=[]; return; }\n    try { const {data}=await this.sb.from('shifts').select('*').in('outlet',outs).order('shift_date').order('scheduled_start').limit(8000); this.shifts=data||[]; } catch(e){ this.shifts=[]; }\n  }\n  restoreSession(){\n    let s=null; try{ s=JSON.parse(localStorage.getItem('cp_session_v1')||'null'); }catch(e){}\n    if(s&&s.type==='owner'){ this.session=s; this.setState({screen:(this.accounts.owner&&this.accounts.owner.password)?'ownerAdmin':'ownerSetup'}); return; }\n    if(s&&s.type==='client'){ const c=this.accounts.clients.find(x=>x.id===s.id); if(c){ this.session=s; this.client=c; this.setState({screen:'boot'}); this.loadClientShifts().then(()=>this.setState({screen:'app',tab:'overview'})); return; } }\n    this.setState({screen:'clientLogin'});\n  }\n  flash(msg){ this.setState({toast:msg}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:''}),2600); }\n\n  /* ---------- auth ---------- */\n  doClientLogin(){\n    const u=(this.f.cu?this.f.cu.value:'').trim().toLowerCase();\n    const p=(this.f.cp?this.f.cp.value:'');\n    const c=this.accounts.clients.find(x=>String(x.username||'').trim().toLowerCase()===u && String(x.password||'')===p);\n    if(!c){ this.setState({err:'Incorrect username or password.'}); return; }\n    this.session={type:'client',id:c.id}; this.client=c; localStorage.setItem('cp_session_v1',JSON.stringify(this.session));\n    this.setState({screen:'boot',err:''}); this.loadClientShifts().then(()=>this.setState({screen:'app',tab:'overview'}));\n  }\n  doOwnerLogin(){ const p=this.f.op?this.f.op.value:''; if(p!==((this.accounts.owner&&this.accounts.owner.password)||'')){ this.setState({err:'Incorrect owner password.'}); return;} this.session={type:'owner'}; localStorage.setItem('cp_session_v1',JSON.stringify(this.session)); this.setState({screen:'ownerAdmin',err:''}); }\n  doOwnerSetup(){ const a=this.f.op1?this.f.op1.value:'', b=this.f.op2?this.f.op2.value:''; if(a.length<4){this.setState({err:'Use at least 4 characters.'});return;} if(a!==b){this.setState({err:'Passwords do not match.'});return;} this.accounts.owner={password:a}; this.saveAccounts(); this.session={type:'owner'}; localStorage.setItem('cp_session_v1',JSON.stringify(this.session)); this.setState({screen:'ownerAdmin',err:''}); }\n  logout(){ localStorage.removeItem('cp_session_v1'); this.session=null; this.client=null; this.shifts=[]; this.setState({screen:'clientLogin',err:'',tab:'overview',selectedDay:null,calCursor:null}); }\n\n  /* ---------- owner: client CRUD ---------- */\n  newClient(){ this.setState({editingClient:{id:null,name:'',username:'',password:'',email:'',outlets:[]}}); }\n  editClient(c){ this.setState({editingClient:JSON.parse(JSON.stringify(c))}); }\n  setDraft(patch){ this.setState({editingClient:Object.assign({},this.state.editingClient,patch)}); }\n  toggleDraftOutlet(name){ const d=this.state.editingClient; const has=d.outlets.includes(name); this.setDraft({outlets: has? d.outlets.filter(o=>o!==name): d.outlets.concat([name]) }); }\n  async saveClient(){\n    const d=this.state.editingClient; const name=(d.name||'').trim(); const un=(d.username||'').trim();\n    if(!name){ this.flash('Enter a client name.'); return; }\n    if(!un){ this.flash('Enter a username.'); return; }\n    if(!d.password){ this.flash('Set a password.'); return; }\n    const clash=this.accounts.clients.find(c=>c.id!==d.id && String(c.username||'').trim().toLowerCase()===un.toLowerCase());\n    if(clash){ this.flash('That username is already taken.'); return; }\n    const now=new Date().toISOString();\n    if(d.id){ const i=this.accounts.clients.findIndex(c=>c.id===d.id); if(i>-1){ const prev=this.accounts.clients[i]; const rec=Object.assign({},prev,{name,username:un,password:d.password,email:(d.email||'').trim(),outlets:d.outlets}); if(prev.password!==d.password) rec.pwCh
